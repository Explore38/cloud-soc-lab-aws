version: "3.9"

services:
  wazuh.manager:
    image: wazuh/wazuh-manager:latest
    container_name: wazuh-manager
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh_manager_data:/var/ossec/data
    networks:
      - soc-net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:latest
    container_name: wazuh-indexer
    environment:
      - "DISCOVERY_TYPE=single-node"
    ports:
      - "9200:9200"
    volumes:
      - wazuh_indexer_data:/usr/share/wazuh-indexer/data
    networks:
      - soc-net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:latest
    container_name: wazuh-dashboard
    ports:
      - "5601:5601"
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    networks:
      - soc-net

volumes:
  wazuh_manager_data:
  wazuh_indexer_data:

networks:
  soc-net:
    driver: bridge
