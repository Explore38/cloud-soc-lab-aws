<!-- Wazuh Agent Configuration (Linux/Windows) -->

<agent_config>
  <syscollector>
    <enabled>yes</enabled>
    <interval>1h</interval>
  </syscollector>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>
</agent_config>
